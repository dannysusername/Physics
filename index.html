<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Grade Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.5px;
    }

    header p {
      color: #94a3b8;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 1.2rem;
    }

    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }

    .field:last-child { margin-bottom: 0; }

    .field label {
      font-size: 0.95rem;
      color: #cbd5e1;
      flex: 1;
    }

    .field label span {
      display: block;
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 1px;
    }

    .field input {
      width: 110px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 1rem;
      padding: 0.5rem 0.75rem;
      text-align: right;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .field input:focus {
      outline: none;
      border-color: #6366f1;
    }

    .field input.empty {
      border-color: #334155;
      color: #64748b;
    }

    .final-row {
      border-top: 1px solid #334155;
      padding-top: 0.9rem;
      margin-top: 0.9rem;
    }

    .final-row label {
      font-weight: 600;
      color: #f1f5f9;
    }

    button {
      width: 100%;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 1rem;
    }

    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.98); }

    /* Result card */
    #result {
      display: none;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }

    #result.visible { display: block; }

    #result .grade-letter {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    #result .grade-pct {
      font-size: 1.4rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.6rem;
    }

    #result .grade-label {
      font-size: 0.85rem;
      color: #64748b;
    }

    /* "What do I need?" section */
    #need-section {
      display: none;
      margin-top: 1rem;
      border-top: 1px solid #334155;
      padding-top: 1rem;
    }

    #need-section.visible { display: block; }

    #need-section p {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.75rem;
    }

    .need-target {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .need-target label {
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .need-target select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 0.9rem;
      padding: 0.4rem 0.6rem;
    }

    #need-result {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: #e2e8f0;
      min-height: 1.4rem;
    }

    #need-result strong { color: #a5b4fc; }

    /* Grade color classes */
    .grade-A   { color: #4ade80; }
    .grade-Am  { color: #86efac; }
    .grade-Bp  { color: #67e8f9; }
    .grade-B   { color: #60a5fa; }
    .grade-Bm  { color: #93c5fd; }
    .grade-Cp  { color: #fbbf24; }
    .grade-C   { color: #f59e0b; }
    .grade-D   { color: #fb923c; }
    .grade-F   { color: #f87171; }

    /* Breakdown */
    #breakdown {
      display: none;
      margin-top: 1rem;
      border-top: 1px solid #334155;
      padding-top: 1rem;
    }

    #breakdown.visible { display: block; }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 0.3rem;
    }

    .breakdown-row span:last-child { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Physics Grade Calculator</h1>
      <p>Enter your scores (0–100) to see your final grade</p>
    </header>

    <div class="card">
      <h2>Your Scores</h2>

      <div class="field">
        <label>Homework / Attendance <span>10% of grade</span></label>
        <input type="text" inputmode="decimal" id="hw" placeholder="e.g. 85 or 13/15" />
      </div>
      <div class="field">
        <label>Exam 1 <span>20% of grade</span></label>
        <input type="text" inputmode="decimal" id="e1" placeholder="e.g. 78 or 47/60" />
      </div>
      <div class="field">
        <label>Exam 2 <span>20% of grade</span></label>
        <input type="text" inputmode="decimal" id="e2" placeholder="e.g. 78 or 47/60" />
      </div>
      <div class="field">
        <label>Exam 3 <span>20% of grade</span></label>
        <input type="text" inputmode="decimal" id="e3" placeholder="e.g. 78 or 47/60" />
      </div>
      <div class="field final-row">
        <label>Final Exam <span>30% of grade</span></label>
        <input type="text" inputmode="decimal" id="fe" placeholder="e.g. 78 or 47/60" />
      </div>
    </div>

    <button onclick="calculate()">Calculate My Grade</button>

    <div id="result">
      <div id="grade-letter" class="grade-letter">—</div>
      <div id="grade-pct" class="grade-pct">—</div>
      <div id="grade-label" class="grade-label">—</div>

      <!-- Breakdown -->
      <div id="breakdown">
        <div id="breakdown-rows"></div>
      </div>

      <!-- What do I need on the final? -->
      <div id="need-section">
        <p>Leave the Final Exam blank to see what score you need:</p>
        <div class="need-target">
          <label>I want to get a</label>
          <select id="target-grade" onchange="calcNeeded()">
            <option value="87">A (87%)</option>
            <option value="85">A- (85%)</option>
            <option value="84">B+ (84%)</option>
            <option value="74">B (74%)</option>
            <option value="72">B- (72%)</option>
            <option value="70">C+ (70%)</option>
            <option value="60">C (60%)</option>
            <option value="45">D (45%)</option>
          </select>
          <label>in the class.</label>
        </div>
        <div id="need-result"></div>
      </div>
    </div>
  </div>

  <script>
    const WEIGHTS = { hw: 0.10, e1: 0.20, e2: 0.20, e3: 0.20, fe: 0.30 };
    const LABELS  = { hw: 'Homework/Attendance', e1: 'Exam 1', e2: 'Exam 2', e3: 'Exam 3', fe: 'Final Exam' };

    function getLetterGrade(pct) {
      if (pct >= 87)  return { letter: 'A',  css: 'grade-A',  desc: 'Excellent work!' };
      if (pct >= 85)  return { letter: 'A−', css: 'grade-Am', desc: 'Great job!' };
      if (pct >= 84)  return { letter: 'B+', css: 'grade-Bp', desc: 'Very good!' };
      if (pct >= 74)  return { letter: 'B',  css: 'grade-B',  desc: 'Good standing.' };
      if (pct >= 72)  return { letter: 'B−', css: 'grade-Bm', desc: 'Above average.' };
      if (pct >= 70)  return { letter: 'C+', css: 'grade-Cp', desc: 'Average.' };
      if (pct >= 60)  return { letter: 'C',  css: 'grade-C',  desc: 'Passing.' };
      if (pct >= 45)  return { letter: 'D',  css: 'grade-D',  desc: 'Below average — passing.' };
      return           { letter: 'F',  css: 'grade-F',  desc: 'Not passing.' };
    }

    function getVal(id) {
      const raw = document.getElementById(id).value.trim();
      if (!raw) return null;
      let v;
      if (raw.includes('/')) {
        const [num, den] = raw.split('/').map(Number);
        if (!den || isNaN(num) || isNaN(den)) return null;
        v = (num / den) * 100;
      } else {
        v = parseFloat(raw);
      }
      return isNaN(v) ? null : Math.min(100, Math.max(0, v));
    }

    function calculate() {
      const vals = { hw: getVal('hw'), e1: getVal('e1'), e2: getVal('e2'), e3: getVal('e3'), fe: getVal('fe') };
      const missingFinal = vals.fe === null;

      // Require at least one score
      const hasAny = Object.values(vals).some(v => v !== null);
      if (!hasAny) {
        alert('Please enter at least one score.');
        return;
      }

      const resultEl   = document.getElementById('result');
      const letterEl   = document.getElementById('grade-letter');
      const pctEl      = document.getElementById('grade-pct');
      const labelEl    = document.getElementById('grade-label');
      const breakdownEl = document.getElementById('breakdown');
      const bRowsEl    = document.getElementById('breakdown-rows');
      const needSec    = document.getElementById('need-section');

      resultEl.classList.add('visible');

      if (missingFinal) {
        // Show "what do I need" mode
        letterEl.className = 'grade-letter grade-B';
        letterEl.textContent = '?';
        pctEl.textContent = 'Final Exam not entered';
        labelEl.textContent = 'See below to find out what you need on the final.';
        breakdownEl.classList.remove('visible');
        needSec.classList.add('visible');
        calcNeeded();
      } else {
        needSec.classList.remove('visible');

        // Calculate weighted total
        let total = 0;
        let weightUsed = 0;
        let rows = '';

        for (const [id, weight] of Object.entries(WEIGHTS)) {
          const v = vals[id];
          if (v !== null) {
            const contrib = v * weight;
            total += contrib;
            weightUsed += weight;
            rows += `<div class="breakdown-row"><span>${LABELS[id]}</span><span>${v.toFixed(1)} × ${(weight*100).toFixed(0)}% = ${contrib.toFixed(2)}</span></div>`;
          }
        }

        // If some scores missing (not final), scale to what's entered
        const scaled = weightUsed < 1 ? (total / weightUsed) : total;
        const g = getLetterGrade(scaled);

        letterEl.className = `grade-letter ${g.css}`;
        letterEl.textContent = g.letter;
        pctEl.textContent = scaled.toFixed(2) + '%';
        const outOf = weightUsed < 1
          ? `Based on ${(weightUsed * 100).toFixed(0)}% of your grade — ${g.desc}`
          : g.desc;
        labelEl.textContent = outOf;

        bRowsEl.innerHTML = rows;
        breakdownEl.classList.add('visible');
      }
    }

    function calcNeeded() {
      const vals = { hw: getVal('hw'), e1: getVal('e1'), e2: getVal('e2'), e3: getVal('e3') };
      const target = parseFloat(document.getElementById('target-grade').value);
      const resultEl = document.getElementById('need-result');

      // Sum up known weighted scores
      let known = 0;
      for (const [id, weight] of Object.entries(WEIGHTS)) {
        if (id === 'fe') continue;
        if (vals[id] !== null) known += vals[id] * weight;
      }

      // target = known + fe * 0.30  =>  fe = (target - known) / 0.30
      const needed = (target - known) / 0.30;

      if (needed <= 0) {
        resultEl.innerHTML = `You already have the grade you want — no matter what you score on the final!`;
      } else if (needed > 100) {
        resultEl.innerHTML = `You would need <strong>${needed.toFixed(1)}%</strong> on the final, which is not achievable. Consider aiming for a lower target grade.`;
      } else {
        resultEl.innerHTML = `You need at least <strong>${needed.toFixed(1)}%</strong> on the final exam.`;
      }
    }

    // Allow pressing Enter to calculate
    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
    });
  </script>
</body>
</html>
