<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Grade Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.5px;
    }

    header p {
      color: #94a3b8;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 1.2rem;
    }

    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }

    .field:last-child { margin-bottom: 0; }

    .field label {
      font-size: 0.95rem;
      color: #cbd5e1;
      flex: 1;
    }

    .field label span {
      display: block;
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 1px;
    }

    .field input {
      width: 110px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 1rem;
      padding: 0.5rem 0.75rem;
      text-align: right;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .field input:focus {
      outline: none;
      border-color: #6366f1;
    }

    .field input.empty {
      border-color: #334155;
      color: #64748b;
    }

    .final-row {
      border-top: 1px solid #334155;
      padding-top: 0.9rem;
      margin-top: 0.9rem;
    }

    .final-row label {
      font-weight: 600;
      color: #f1f5f9;
    }

    button {
      width: 100%;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 1rem;
    }

    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.98); }

    /* Result card */
    #result {
      display: none;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }

    #result.visible { display: block; }

    #result .grade-letter {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    #result .grade-pct {
      font-size: 1.4rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.6rem;
    }

    #result .grade-label {
      font-size: 0.85rem;
      color: #64748b;
    }

    /* "What do I need?" section */
    #need-section {
      display: none;
      margin-top: 1rem;
      border-top: 1px solid #334155;
      padding-top: 1rem;
    }

    #need-section.visible { display: block; }

    #need-section p {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.75rem;
    }

    .need-target {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .need-target label {
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .need-target select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 0.9rem;
      padding: 0.4rem 0.6rem;
    }

    #need-result {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: #e2e8f0;
      min-height: 1.4rem;
    }

    #need-result strong { color: #a5b4fc; }

    /* Grade color classes */
    .grade-A   { color: #4ade80; }
    .grade-Am  { color: #86efac; }
    .grade-Bp  { color: #67e8f9; }
    .grade-B   { color: #60a5fa; }
    .grade-Bm  { color: #93c5fd; }
    .grade-Cp  { color: #fbbf24; }
    .grade-C   { color: #f59e0b; }
    .grade-D   { color: #fb923c; }
    .grade-F   { color: #f87171; }

    /* Breakdown */
    #breakdown {
      display: none;
      margin-top: 1rem;
      border-top: 1px solid #334155;
      padding-top: 1rem;
    }

    #breakdown.visible { display: block; }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 0.3rem;
    }

    .breakdown-row span:last-child { color: #94a3b8; }

    /* Falling GIFs */
    #gif-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .falling-gif {
      position: absolute;
      top: -160px;
      width: 130px;
      height: 130px;
      object-fit: contain;
      opacity: 0.55;
      animation: fall linear forwards;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    .container { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="gif-rain"></div>
  <div class="container">
    <header>
      <h1>Physics Grade Calculator</h1>
      <p>Enter scores as a percentage (85), decimal (0.85), or fraction (16/30)</p>
    </header>

    <div class="card">
      <h2>Your Scores</h2>

      <div class="field">
        <label>Homework / Attendance <span>10% of grade</span></label>
        <input type="text" inputmode="decimal" id="hw" placeholder="" />
      </div>
      <div class="field">
        <label>Exam 1 <span>20% of grade</span></label>
        <input type="text" inputmode="decimal" id="e1" placeholder="" />
      </div>
      <div class="field">
        <label>Exam 2 <span>20% of grade</span></label>
        <input type="text" inputmode="decimal" id="e2" placeholder="" />
      </div>
      <div class="field">
        <label>Exam 3 <span>20% of grade</span></label>
        <input type="text" inputmode="decimal" id="e3" placeholder="" />
      </div>
      <div class="field final-row">
        <label>Final Exam <span>30% of grade</span></label>
        <input type="text" inputmode="decimal" id="fe" placeholder="" />
      </div>
    </div>

    <button onclick="calculate()">Calculate My Grade</button>

    <div id="result">
      <div id="grade-letter" class="grade-letter">—</div>
      <div id="grade-pct" class="grade-pct">—</div>
      <div id="grade-label" class="grade-label">—</div>

      <!-- Breakdown -->
      <div id="breakdown">
        <div id="breakdown-rows"></div>
      </div>

      <!-- What do I need on the final? -->
      <div id="need-section">
        <p>Leave the Final Exam blank to see what score you need:</p>
        <div class="need-target">
          <label>I want to get a</label>
          <select id="target-grade" onchange="calcNeeded()">
            <option value="87">A (87%)</option>
            <option value="85">A- (85%)</option>
            <option value="84">B+ (84%)</option>
            <option value="74">B (74%)</option>
            <option value="72">B- (72%)</option>
            <option value="70">C+ (70%)</option>
            <option value="60">C (60%)</option>
            <option value="45">D (45%)</option>
          </select>
          <label>in the class.</label>
        </div>
        <div id="need-result"></div>
      </div>
    </div>
  </div>

  <script>
    const WEIGHTS = { hw: 0.10, e1: 0.20, e2: 0.20, e3: 0.20, fe: 0.30 };
    const LABELS  = { hw: 'Homework/Attendance', e1: 'Exam 1', e2: 'Exam 2', e3: 'Exam 3', fe: 'Final Exam' };

    function getLetterGrade(pct) {
      if (pct >= 87)  return { letter: 'A',  css: 'grade-A',  desc: 'Excellent work!' };
      if (pct >= 85)  return { letter: 'A−', css: 'grade-Am', desc: 'Great job!' };
      if (pct >= 84)  return { letter: 'B+', css: 'grade-Bp', desc: 'Very good!' };
      if (pct >= 74)  return { letter: 'B',  css: 'grade-B',  desc: 'Good standing.' };
      if (pct >= 72)  return { letter: 'B−', css: 'grade-Bm', desc: 'Above average.' };
      if (pct >= 70)  return { letter: 'C+', css: 'grade-Cp', desc: 'Average.' };
      if (pct >= 60)  return { letter: 'C',  css: 'grade-C',  desc: 'Passing.' };
      if (pct >= 45)  return { letter: 'D',  css: 'grade-D',  desc: 'Below average — passing.' };
      return           { letter: 'F',  css: 'grade-F',  desc: 'Not passing.' };
    }

    // Returns { pct, display } or null if empty/invalid
    function getVal(id) {
      const raw = document.getElementById(id).value.trim();
      if (!raw) return null;
      let pct;
      if (raw.includes('/')) {
        const parts = raw.split('/');
        const num = parseFloat(parts[0]);
        const den = parseFloat(parts[1]);
        if (isNaN(num) || isNaN(den) || den === 0) return null;
        pct = (num / den) * 100;
      } else {
        const n = parseFloat(raw);
        if (isNaN(n)) return null;
        // If strictly between 0 and 1 (exclusive), treat as decimal (e.g. 0.85 → 85%)
        pct = (n > 0 && n < 1) ? n * 100 : n;
      }
      return { pct: Math.min(100, Math.max(0, pct)), display: raw };
    }

    // Returns the id of the lowest-scoring entered exam (hw/e1/e2/e3), or null if none entered.
    function findLowestId(vals) {
      let lowestId = null;
      let lowestPct = Infinity;
      for (const id of ['e1', 'e2', 'e3']) {
        if (vals[id] !== null && vals[id].pct < lowestPct) {
          lowestPct = vals[id].pct;
          lowestId = id;
        }
      }
      return lowestId;
    }

    function calculate() {
      const vals = { hw: getVal('hw'), e1: getVal('e1'), e2: getVal('e2'), e3: getVal('e3'), fe: getVal('fe') };

      const hasAny = Object.values(vals).some(v => v !== null);
      if (!hasAny) {
        alert('Please enter at least one score.');
        return;
      }

      const resultEl    = document.getElementById('result');
      const letterEl    = document.getElementById('grade-letter');
      const pctEl       = document.getElementById('grade-pct');
      const labelEl     = document.getElementById('grade-label');
      const breakdownEl = document.getElementById('breakdown');
      const bRowsEl     = document.getElementById('breakdown-rows');
      const needSec     = document.getElementById('need-section');

      resultEl.classList.add('visible');

      // If the final is entered and beats the lowest score, replace that score's value with the final's.
      // The replaced category keeps its original weight; the final still counts at its own 30% weight too.
      let replacedId = null;
      const workingVals = Object.assign({}, vals);

      if (vals.fe !== null) {
        const lowestId = findLowestId(vals);
        if (lowestId !== null && vals.fe.pct > vals[lowestId].pct) {
          replacedId = lowestId;
          workingVals[lowestId] = {
            pct: vals.fe.pct,
            display: vals.fe.display,
            originalPct: vals[lowestId].pct,
            originalDisplay: vals[lowestId].display,
          };
        }
      }

      let total = 0;
      let weightUsed = 0;
      let rows = '';

      for (const [id, weight] of Object.entries(WEIGHTS)) {
        const entry = workingVals[id];
        if (entry !== null) {
          const contrib = entry.pct * weight;
          total += contrib;
          weightUsed += weight;
          if (id === replacedId) {
            rows += `<div class="breakdown-row">
              <span>${LABELS[id]} <span style="color:#a5b4fc">[replaced by final]</span></span>
              <span>${entry.display} (${entry.pct.toFixed(1)}%) × ${(weight*100).toFixed(0)}% = ${contrib.toFixed(2)} <span style="color:#64748b">was ${entry.originalDisplay} (${entry.originalPct.toFixed(1)}%)</span></span>
            </div>`;
          } else {
            rows += `<div class="breakdown-row"><span>${LABELS[id]}</span><span>${entry.display} (${entry.pct.toFixed(1)}%) × ${(weight*100).toFixed(0)}% = ${contrib.toFixed(2)}</span></div>`;
          }
        }
      }

      // Scale to the weight actually entered
      const scaled = total / weightUsed;
      const g = getLetterGrade(scaled);

      letterEl.className = `grade-letter ${g.css}`;
      letterEl.textContent = g.letter;
      pctEl.textContent = scaled.toFixed(2) + '%';

      const weightPct = Math.round(weightUsed * 100);
      let desc = weightPct < 100
        ? `Based on ${weightPct}% of your grade — ${g.desc}`
        : g.desc;
      if (replacedId) desc += ` · Final replaced ${LABELS[replacedId]}.`;
      labelEl.textContent = desc;

      bRowsEl.innerHTML = rows;
      breakdownEl.classList.add('visible');

      // Show "what do I need on final" if final is not entered
      if (vals.fe === null) {
        needSec.classList.add('visible');
        calcNeeded();
      } else {
        needSec.classList.remove('visible');
      }
    }

    function calcNeeded() {
      const vals = { hw: getVal('hw'), e1: getVal('e1'), e2: getVal('e2'), e3: getVal('e3') };
      const target = parseFloat(document.getElementById('target-grade').value);
      const resultEl = document.getElementById('need-result');

      // Sum known weighted scores and find the lowest entered score
      let known = 0;
      for (const [id, weight] of Object.entries(WEIGHTS)) {
        if (id === 'fe') continue;
        if (vals[id] !== null) known += vals[id].pct * weight;
      }

      const lowestId = findLowestId(vals);
      const lowestPct    = lowestId !== null ? vals[lowestId].pct    : null;
      const lowestWeight = lowestId !== null ? WEIGHTS[lowestId]     : 0;
      const knownWithoutLowest = lowestId !== null ? known - lowestPct * lowestWeight : known;

      // Case A: final beats the lowest score → it fills both final weight AND lowest weight
      //   target = knownWithoutLowest + final * (lowestWeight + 0.30)
      //   → final = (target - knownWithoutLowest) / (lowestWeight + 0.30)
      //   Valid only when this value > lowestPct (replacement actually triggers)
      const neededA = lowestId !== null
        ? (target - knownWithoutLowest) / (lowestWeight + 0.30)
        : null;

      // Case B: final does NOT beat the lowest score → normal 30% weight
      //   target = known + final * 0.30
      const neededB = (target - known) / 0.30;

      // Pick whichever case is self-consistent; replacement scenario is more favorable so check first
      let needed, replacementNote = '';
      if (neededA !== null && neededA > lowestPct) {
        needed = neededA;
        replacementNote = ` <span style="color:#64748b">(would replace your ${LABELS[lowestId]} score of ${lowestPct.toFixed(1)}%)</span>`;
      } else {
        needed = neededB;
      }

      if (needed <= 0) {
        resultEl.innerHTML = `You already have the grade you want — no matter what you score on the final!`;
      } else if (needed > 100) {
        resultEl.innerHTML = `You would need <strong>${needed.toFixed(1)}%</strong> on the final, which is not achievable. Consider aiming for a lower target grade.`;
      } else {
        resultEl.innerHTML = `You need at least <strong>${needed.toFixed(1)}%</strong> on the final exam.${replacementNote}`;
      }
    }

    // Allow pressing Enter to calculate
    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
    });

    // Falling GIFs
    const GIF_IDS = [
      'fYLrVmLXG9tVL4Aykg', // cat crying meme
      'Qdln98keGghKXmVvMC', // cry rage yell
      '80KkI75XwbEE1wRdMA', // cry screaming
      'gzHQCsyAYRxjzHT493', // screaming into sky
      'Mw7UXyH9zR7Ms',       // sad Will Ferrell
      'Qc5vv7hw1moPC',       // sad Leonardo DiCaprio
      '4Rva6oTJpqQGA',       // ugly cry
      'l4FGnGenUW9VuLgWI',   // Jimmy Fallon ugly cry
      'SqmkZ5IdwzTP2',       // Despicable Me minion shock
      'P8gqZQp6fG111SJmEn',  // Kung Fu Panda shock
      'H5C8CevNMbpBqNqFjl',  // Pedro monkey puppet
      '2GVVvT5ATZtUQ',       // shocked Bart Simpson
      'LyJ6KPlrFdKnK',       // Steve Harvey reaction
      'meJN6qdG74lUKAJTQl',  // shocked dog
      'd1ytb3wOL6PiF1iSan',  // angry cry baby
      '26ufdipQqU2lhNA4g',   // mind blown explosion
      '75ZaxapnyMp2w',       // Tim & Eric mind blown
      'OK27wINdQS5YQ',       // Kramer mind blown
      '5aLrlDiJPMPFS',       // Jon Stewart mind blown
      'xU9TT471DTGJq',       // screaming Homer Simpson
      '9sSrddsom3yb6',       // Homer Simpson screaming
      'gPYW19uX4VIyKULedP',  // IShowSpeed raging
      'KmTnUKop0AfFm',       // Lion King screaming
      'HUkOv6BNWc1HO',       // panic omg
      'R7weSSUjdPdoA',       // stressed freak out
      'ie4fEHT4krdDO',       // Cosmo Kramer omg
      '47nNHdEE4LGp2',       // Zayn Malik freaking out
      '105jkT1dbQiNK8',      // freaking out
      '3bLhqnqJjMNtC',       // excited freak out
      // cringy you got this
      '5kIh9jg6olLrZJtAf6',  // you can do it
      'U4qDadHZSQnwawnkoz',  // you got this
      '11F0d3IVhQbreE',      // Bill Murray encouraging
      'faTOHi0omqCMU',       // you can do it cheering
      'yoJC2K6rCzwNY2EngA',  // Rob Schneider YOU CAN DO IT
      '12XDYvMJNcmLgQ',      // SpongeBob good luck
      'xT4uQCnq6bDx8itLhK',  // motivational you can do it
      'HxvPz7v9V0PDTwb7sg',  // Oprah "you got this"
      'YW01MEr19Og265S0fN',  // "I beleaf in you" (leaf pun)
      'l1J9PdkDJ2r8sg4ZG',   // Chippy the dog be happy
      'anbU640TCuUaA',        // never give up sayings
      'o0PuN9xxrBl9tzG9bD',  // believe do it
      '1g98EoA7WX2mNmztm4',  // believe never give up grind
      'Jl1Q9APSZVA3ATKrdM',  // Piñata Farms sport what
      'FsWse1Shhkkje2HS7D',  // YouTube yes
      'yTxFCdDx7R9U8hi7ld',  // keep going
      'l2YWxte7sJB2XuE8M',   // keep going
      'l3mZcxZKIQemTeT9S',   // keep going
      'Py1LkJpCEtNiFo0Chr',  // motivate believe in yourself
      'me3iX0hHqvLMVAX1gZ',  // you can
    ];

    const rain = document.getElementById('gif-rain');

    function spawnGif() {
      const img = document.createElement('img');
      img.className = 'falling-gif';
      img.src = `https://media.giphy.com/media/${GIF_IDS[Math.floor(Math.random() * GIF_IDS.length)]}/giphy.gif`;
      img.style.left = Math.random() * 95 + 'vw';
      const duration = 4 + Math.random() * 6; // 4–10s
      img.style.animationDuration = duration + 's';
      const size = 100 + Math.random() * 120; // 100–220px
      img.style.width = img.style.height = size + 'px';
      rain.appendChild(img);
      img.addEventListener('animationend', () => img.remove());
    }

    // Stagger initial spawns then keep a steady stream
    for (let i = 0; i < 12; i++) {
      setTimeout(spawnGif, i * 300);
    }
    setInterval(spawnGif, 500);
  </script>
</body>
</html>
